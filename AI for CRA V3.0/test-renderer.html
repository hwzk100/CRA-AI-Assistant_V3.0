<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试页面 - CRA AI Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h1 { color: #333; margin-bottom: 20px; }
    .test {
      padding: 15px;
      margin: 10px 0;
      border-radius: 6px;
      border-left: 4px solid #667eea;
      background: #f8f9fa;
    }
    .success { border-left-color: #10b981; background: #d1fae5; }
    .error { border-left-color: #ef4444; background: #fee2e2; }
    .info { border-left-color: #3b82f6; background: #dbeafe; }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin: 5px;
    }
    button:hover { background: #5568d3; }
    #output {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 15px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 15px;
    }
    .log { margin: 5px 0; padding: 2px 0; }
    .log-info { color: #4ec9b0; }
    .log-error { color: #f48771; }
    .log-success { color: #b5cea8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 CRA AI Assistant - 功能测试</h1>

    <div id="tests"></div>

    <div class="test">
      <h3>控制台输出</h3>
      <button onclick="clearOutput()">清空</button>
      <div id="output"></div>
    </div>

    <div class="test">
      <h3>操作</h3>
      <button onclick="testReactLoad()">测试 React 加载</button>
      <button onclick="testDOMElement()">测试 DOM 元素</button>
      <button onclick="testElectronAPI()">测试 Electron API</button>
      <button onclick="loadMainApp()">加载主应用</button>
    </div>
  </div>

  <script>
    const output = document.getElementById('output');
    const tests = document.getElementById('tests');

    function log(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log log-${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      output.appendChild(entry);
      output.scrollTop = output.scrollHeight;
      console.log(`[${type.toUpperCase()}]`, message);
    }

    function clearOutput() {
      output.innerHTML = '';
    }

    function runTests() {
      log('开始运行测试...', 'info');

      const testResults = [
        { name: 'DOM 加载', test: () => document.readyState === 'complete' || document.readyState === 'interactive' },
        { name: 'JavaScript 运行', test: () => true },
        { name: 'CSS 样式加载', test: () => getComputedStyle(document.body).fontFamily },
      ];

      tests.innerHTML = testResults.map(result => {
        const passed = result.test();
        return `<div class="test ${passed ? 'success' : 'error'}">${passed ? '✓' : '✗'} ${result.name}</div>`;
      }).join('');

      // 检查环境
      const envInfo = `
        <div class="test info">
          <strong>环境信息:</strong><br>
          UserAgent: ${navigator.userAgent}<br>
          Platform: ${navigator.platform}<br>
          Language: ${navigator.language}<br>
          URL: ${window.location.href}<br>
          Document ReadyState: ${document.readyState}
        </div>
      `;
      tests.innerHTML += envInfo;

      log('环境检查完成', 'success');
    }

    function testReactLoad() {
      log('检查 React 加载状态...', 'info');

      const hasReact = typeof React !== 'undefined';
      const hasReactDOM = typeof ReactDOM !== 'undefined';

      if (hasReact && hasReactDOM) {
        log('✓ React 和 ReactDOM 已加载', 'success');

        // 尝试创建一个简单的 React 组件
        try {
          const TestApp = () => React.createElement('div', {
            style: { padding: '20px', background: '#d1fae5', borderRadius: '8px' }
          }, '✓ React 渲染测试成功！');

          const root = document.createElement('div');
          document.body.appendChild(root);

          const reactRoot = ReactDOM.createRoot(root);
          reactRoot.render(TestApp);

          log('✓ React 组件渲染成功', 'success');
        } catch (error) {
          log('✗ React 渲染失败: ' + error.message, 'error');
        }
      } else {
        log('✗ React 未加载', 'error');
        log('  React 存在: ' + hasReact, 'info');
        log('  ReactDOM 存在: ' + hasReactDOM, 'info');
      }
    }

    function testDOMElement() {
      log('检查 DOM 元素...', 'info');

      const rootElement = document.getElementById('root');
      if (rootElement) {
        log('✓ 找到 #root 元素', 'success');
        log('  内容: ' + (rootElement.innerHTML || '空'), 'info');
      } else {
        log('✗ 未找到 #root 元素', 'error');

        // 创建一个
        const newRoot = document.createElement('div');
        newRoot.id = 'root';
        newRoot.style.cssText = 'padding: 20px; background: #fee2e2; margin-top: 10px;';
        newRoot.textContent = '这是新创建的 root 元素';
        document.body.appendChild(newRoot);
        log('✓ 已创建新的 #root 元素', 'success');
      }
    }

    function testElectronAPI() {
      log('检查 Electron API...', 'info');

      if (typeof window !== 'undefined' && window.electronAPI) {
        log('✓ window.electronAPI 存在', 'success');
        const methods = Object.keys(window.electronAPI);
        log('  可用方法: ' + methods.join(', '), 'info');

        // 尝试调用一个简单的 API
        if (window.electronAPI.getVersion) {
          window.electronAPI.getVersion().then(result => {
            if (result.success) {
              log('✓ API 调用成功! 版本: ' + result.data, 'success');
            } else {
              log('✗ API 调用失败: ' + result.error?.userMessage, 'error');
            }
          }).catch(error => {
            log('✗ API 调用异常: ' + error.message, 'error');
          });
        }
      } else {
        log('✗ window.electronAPI 不存在', 'error');
        log('  这可能是因为:', 'info');
        log('  1. 不在 Electron 环境中运行', 'info');
        log('  2. preload 脚本未正确加载', 'info');
      }
    }

    function loadMainApp() {
      log('准备加载主应用...', 'info');
      window.location.href = 'index.html';
    }

    // 页面加载完成后运行测试
    document.addEventListener('DOMContentLoaded', () => {
      log('测试页面已加载', 'success');
      runTests();
    });

    // 监听错误
    window.addEventListener('error', (event) => {
      log('全局错误: ' + event.error?.message || event.message, 'error');
      if (event.error?.stack) {
        log('  堆栈: ' + event.error.stack.split('\n')[0], 'info');
      }
    });

    window.addEventListener('unhandledrejection', (event) => {
      log('未处理的 Promise 拒绝: ' + event.reason, 'error');
    });

    log('测试页面初始化完成', 'success');
  </script>
</body>
</html>
